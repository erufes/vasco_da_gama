<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1,
maximum-scale=1,
user-scalable=no">

<title>Projeto Carro 1</title>

<style>

/* reset */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

/* fundo */

body{

  background:linear-gradient(135deg,#0f172a,#1e293b);

  min-height:100vh;

  display:flex;
  justify-content:center;
  align-items:center;

  font-family:Arial, Helvetica, sans-serif;

  user-select:none;
  -webkit-user-select:none;

  overflow:hidden;
}

/* container */

.container{

  width:95%;
  max-width:420px;

  background:rgba(255,255,255,0.08);

  backdrop-filter:blur(15px);

  border:1px solid rgba(255,255,255,0.1);

  border-radius:28px;

  padding:30px 20px;

  box-shadow:
  0 0 30px rgba(0,0,0,0.35);

  text-align:center;
}

/* titulo */

h1{

  color:white;

  margin-bottom:35px;

  font-size:2rem;
}

/* linhas */

.row{

  display:flex;

  justify-content:center;

  gap:16px;

  margin:18px 0;
}

/* botoes */

button{

  width:110px;

  height:110px;

  border:none;

  border-radius:24px;

  font-size:1rem;

  font-weight:bold;

  color:white;

  cursor:pointer;

  transition:0.15s;

  touch-action:none;

  user-select:none;
  -webkit-user-select:none;

  box-shadow:
  0 8px 20px rgba(0,0,0,0.35);
}

/* efeito clique */

button:active{

  transform:scale(0.92);
}

/* cores */

.forward{

  background:
  linear-gradient(145deg,#22c55e,#16a34a);
}

.reverse{

  background:
  linear-gradient(145deg,#f97316,#ea580c);
}

.left,
.right{

  background:
  linear-gradient(145deg,#3b82f6,#2563eb);
}

</style>

<script>

// ======================
// IP DA ESP32
// ======================

const ESP32_IP =
"http://192.168.0.101";

// ======================
// VARIAVEIS
// ======================

let interval = null;

let comandoAtual = null;

// ======================
// ENVIAR COMANDO
// ======================

function enviar(cmd){

  fetch(ESP32_IP + cmd)
  .catch(() => {});
}

// ======================
// INICIAR MOVIMENTO
// ======================

function iniciar(cmd){

  if(comandoAtual === cmd){
    return;
  }

  parar();

  comandoAtual = cmd;

  enviar(cmd);

  interval = setInterval(() => {

    enviar(cmd);

  }, 100);
}

// ======================
// PARAR
// ======================

function parar(){

  if(interval){

    clearInterval(interval);

    interval = null;
  }

  comandoAtual = null;

  enviar('/stop');
}

// ======================
// EVENTOS GLOBAIS
// ======================

document.addEventListener(
  'mouseup',
  parar
);

document.addEventListener(
  'touchend',
  parar
);

window.addEventListener(
  'blur',
  parar
);

</script>

</head>

<body>

<div class="container">

  <h1>Projeto Carro 1</h1>

  <!-- frente -->

  <div class="row">

    <button
      class="forward"

      onpointerdown="iniciar('/forward')"

      onpointerup="parar()"

      onpointerleave="parar()"

      onpointercancel="parar()">

      FRENTE

    </button>

  </div>

  <!-- esquerda direita -->

  <div class="row">

    <button
      class="left"

      onpointerdown="iniciar('/left')"

      onpointerup="parar()"

      onpointerleave="parar()"

      onpointercancel="parar()">

      ESQ

    </button>

    <button
      class="right"

      onpointerdown="iniciar('/right')"

      onpointerup="parar()"

      onpointerleave="parar()"

      onpointercancel="parar()">

      DIR

    </button>

  </div>

  <!-- re -->

  <div class="row">

    <button
      class="reverse"

      onpointerdown="iniciar('/reverse')"

      onpointerup="parar()"

      onpointerleave="parar()"

      onpointercancel="parar()">

      RÉ

    </button>

  </div>

</div>

</body>

</html>
