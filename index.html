<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1,
maximum-scale=1,
user-scalable=no">

<title>Projeto Carro 1</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{

  background:linear-gradient(135deg,#0f172a,#1e293b);

  min-height:100vh;

  display:flex;
  justify-content:center;
  align-items:center;

  font-family:Arial, Helvetica, sans-serif;

  overflow:hidden;
}

.container{

  width:95%;
  max-width:420px;

  background:rgba(255,255,255,0.08);

  backdrop-filter:blur(15px);

  border:1px solid rgba(255,255,255,0.1);

  border-radius:28px;

  padding:30px 20px;

  box-shadow:
  0 0 30px rgba(0,0,0,0.35);

  text-align:center;
}

h1{

  color:white;

  margin-bottom:30px;
}

.status{

  color:#cbd5e1;

  margin-bottom:25px;

  font-size:1rem;
}

button{

  width:100%;

  height:90px;

  border:none;

  border-radius:22px;

  font-size:1.2rem;

  font-weight:bold;

  color:white;

  cursor:pointer;

  background:linear-gradient(145deg,#22c55e,#16a34a);

  box-shadow:
  0 8px 20px rgba(0,0,0,0.35);
}

</style>

</head>

<body>

<div class="container">

  <h1>Projeto Carro 1</h1>

  <div class="status" id="status">

    Clique para iniciar

  </div>

  <button onclick="iniciarSensores()">

    INICIAR CONTROLE

  </button>

</div>

<script>

// ======================
// TROQUE PELO IP DA SUA ESP32
// ======================

const ESP32_IP = "http://192.168.0.101";

// ======================
// VARIAVEIS
// ======================

let interval = null;

let comandoAtual = null;

// ======================
// STATUS
// ======================

const statusDiv =
document.getElementById("status");

// ======================
// ENVIAR
// ======================

function enviar(cmd){

  fetch(ESP32_IP + cmd)
  .catch(() => {});
}

// ======================
// INICIAR MOVIMENTO
// ======================

function iniciar(cmd){

  if(comandoAtual === cmd){
    return;
  }

  parar();

  comandoAtual = cmd;

  enviar(cmd);

  interval = setInterval(() => {

    enviar(cmd);

  }, 100);
}

// ======================
// PARAR
// ======================

function parar(){

  if(interval){

    clearInterval(interval);

    interval = null;
  }

  comandoAtual = null;

  enviar('/stop');

  statusDiv.innerHTML =
  "PARADO";
}

// ======================
// CONTROLAR MOVIMENTO
// ======================

function controlarMovimento(beta, gamma){

  // frente

  if(beta < -15){

    statusDiv.innerHTML =
    "FRENTE";

    iniciar('/forward');
  }

  // re

  else if(beta > 15){

    statusDiv.innerHTML =
    "RÉ";

    iniciar('/reverse');
  }

  // direita

  else if(gamma > 15){

    statusDiv.innerHTML =
    "DIREITA";

    iniciar('/right');
  }

  // esquerda

  else if(gamma < -15){

    statusDiv.innerHTML =
    "ESQUERDA";

    iniciar('/left');
  }

  // parado

  else{

    parar();
  }
}

// ======================
// INICIAR SENSORES
// ======================

async function iniciarSensores(){

  // iphone

  if(typeof DeviceOrientationEvent
  .requestPermission === 'function'){

    const permissao =
    await DeviceOrientationEvent
    .requestPermission();

    if(permissao !== 'granted'){

      alert("Permissão negada");

      return;
    }
  }

  statusDiv.innerHTML =
  "CONTROLE ATIVADO";

  // lê sensores

  window.addEventListener(
    'deviceorientation',

    (event) => {

      controlarMovimento(

        event.beta,
        event.gamma
      );
    }
  );
}

// ======================
// SEGURANÇA
// ======================

window.addEventListener(
  'blur',
  parar
);

</script>

</body>

</html>
