<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1,
maximum-scale=1,
user-scalable=no">

<title>Projeto Carro 1</title>

<style>

/* reseta margens padrão */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

/* estilo do fundo */
body{

  background:linear-gradient(135deg,#0f172a,#1e293b);

  min-height:100vh;

  display:flex;
  justify-content:center;
  align-items:center;

  font-family:Arial, Helvetica, sans-serif;

  user-select:none;
  -webkit-user-select:none;

  overflow:hidden;
}

/* caixa principal */
.container{

  width:95%;
  max-width:420px;

  background:rgba(255,255,255,0.08);

  backdrop-filter:blur(15px);

  border:1px solid rgba(255,255,255,0.1);

  border-radius:28px;

  padding:30px 20px;

  box-shadow:
  0 0 30px rgba(0,0,0,0.35);

  text-align:center;
}

h1{

  color:white;

  margin-bottom:35px;

  font-size:2rem;
}

/* linha dos botões */
.row{
  display:flex;
  justify-content:center;
  gap:16px;
  margin:18px 0;
}

/* estilo geral dos botões */
button{

  width:110px;
  height:110px;

  border:none;
  border-radius:24px;

  font-size:1rem;
  font-weight:bold;

  color:white;

  cursor:pointer;

  transition:0.15s;

  touch-action:none;

  user-select:none;
  -webkit-user-select:none;

  box-shadow:
  0 8px 20px rgba(0,0,0,0.35);
}

/* animação ao apertar */
button:active{
  transform:scale(0.92);
}

/* botão frente */
.forward{
  background:linear-gradient(145deg,#22c55e,#16a34a);
}

/* botão ré */
.reverse{
  background:linear-gradient(145deg,#f97316,#ea580c);
}

/* botões esquerda e direita */
.left,
.right{
  background:linear-gradient(145deg,#3b82f6,#2563eb);
}

</style>

<script>

// variável do intervalo
let interval = null;

// guarda qual comando está ativo
let comandoAtual = null;

// função que envia comandos pro ESP32
function enviar(cmd){

  fetch(cmd).catch(() => {});
}

// começa um movimento
function iniciar(cmd){

  if(comandoAtual === cmd){
    return;
  }

  parar();

  comandoAtual = cmd;

  enviar(cmd);

  interval = setInterval(() => {

    enviar(cmd);

  }, 100);
}

// para o robô
function parar(){

  if(interval){

    clearInterval(interval);

    interval = null;
  }

  comandoAtual = null;

  enviar('/stop');
}

// eventos globais
document.addEventListener('mouseup', parar);
document.addEventListener('touchend', parar);
window.addEventListener('blur', parar);

</script>

</head>

<body>

<div class="container">

  <h1>Projeto Carro 1</h1>

  <!-- botão frente -->
  <div class="row">

    <button
      class="forward"

      onpointerdown="iniciar('/forward')"

      onpointerup="parar()"

      onpointerleave="parar()"

      onpointercancel="parar()">

      FRENTE

    </button>

  </div>

  <!-- linha esquerda e direita -->
  <div class="row">

    <!-- esquerda -->
    <button
      class="left"

      onpointerdown="iniciar('/left')"

      onpointerup="parar()"

      onpointerleave="parar()"

      onpointercancel="parar()">

      ESQ

    </button>

    <!-- direita -->
    <button
      class="right"

      onpointerdown="iniciar('/right')"

      onpointerup="parar()"

      onpointerleave="parar()"

      onpointercancel="parar()">

      DIR

    </button>

  </div>

  <!-- botão ré -->
  <div class="row">

    <button
      class="reverse"

      onpointerdown="iniciar('/reverse')"

      onpointerup="parar()"

      onpointerleave="parar()"

      onpointercancel="parar()">

      RÉ

    </button>

  </div>

</div>

</body>
</html>
